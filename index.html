<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>امتلك سحابتك - 10 جنيه بس</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
body{font-family:tahoma;background:linear-gradient(#87CEEB,#E0F6FF);text-align:center;padding:30px;margin:0}
h1{color:#1a5490}
.cloud{font-size:100px;margin:15px;cursor:pointer;border:3px solid transparent;padding:15px;border-radius:20px;transition:0.3s;display:inline-block}
.cloud.selected{border-color:gold;background:rgba(255,215,0,0.3);transform:scale(1.15)}
#certificate{width:90%;max-width:600px;margin:30px auto;background:white;padding:40px 20px;border-radius:20px;display:none;box-shadow:0 10px 30px rgba(0,0,0,0.2)}
button{background:linear-gradient(gold,orange);border:none;padding:18px 40px;font-size:20px;border-radius:15px;cursor:pointer;font-weight:bold;margin:10px;display:block;width:80%;max-width:350px;margin:15px auto}
#musicBtn{background:linear-gradient(#9b59b6,#8e44ad);color:white;font-size:16px;padding:12px}
#payBtn{background:linear-gradient(#25D366,#128C7E);color:white}
#downloadBtn{background:linear-gradient(#1a5490,#87CEEB);color:white;display:none}
input{padding:15px;font-size:20px;width:80%;max-width:300px;border-radius:10px;border:2px solid #87CEEB;text-align:center}
</style>
</head>
<body>

<audio id="bgMusic" loop>
  <source src="https://cdn.pixabay.com/audio/2022/03/10/audio_d1718a8f9e.mp3" type="audio/mpeg">
</audio>
<audio id="dingSound">
  <source src="https://cdn.pixabay.com/audio/2022/03/24/audio_d1718a8f9e.mp3" type="audio/mpeg">
</audio>

<h1>☁️ امتلك سحابتك بـ 10 جنيه بس ☁️</h1>
<button id="musicBtn" onclick="playMusic()">🎵 دوس هنا عشان الموسيقى تشتغل</button>

<div>
  <span class="cloud" onclick="selectCloud('☁️', this)">☁️</span>
  <span class="cloud" onclick="selectCloud('🌩️', this)">🌩️</span>
  <span class="cloud" onclick="selectCloud('🌈', this)">🌈</span>
  <span class="cloud" onclick="selectCloud('⛅', this)">⛅</span>
  <span class="cloud" onclick="selectCloud('❄️', this)">❄️</span>
</div>

<br>
<input id="name" placeholder="اكتب اسمك هنا">
<br>
<button id="payBtn" onclick="pay()">1. ادفع 10ج واتساب 01282175854</button>
<button id="downloadBtn" onclick="download()">2. نزل شهادتك بعد الدفع</button>

<div id="certificate">
  <h2>☁️ شهادة ملكية سحابة افتراضية ☁️</h2>
  <div id="cloudShow" style="font-size:130px;margin:20px">☁️</div>
  <h3>هذه السحابة ملك للاستاذ/ة <span id="nameShow" style="color:#1a5490"></span></h3>
  <p style="font-size:20px">رقم السحابة: #SC-<span id="num"></span></p>
  <p style="font-size:12px;color:gray">تم الشراء بتاريخ: <span id="date"></span></p>
</div>

<script>
let selectedCloud = '☁️';
let customerName = '';
let cloudNum = 0;
let paid = false;

function playMusic(){
  document.getElementById('bgMusic').play().then(()=>{
    document.getElementById('musicBtn').innerText = '🔊 الموسيقى شغالة';
    document.getElementById('musicBtn').disabled = true;
  }).catch(()=>{
    alert('دوس الزرار مرة كمان الموسيقى هتشتغل');
  });
}

function selectCloud(c, el){
  selectedCloud = c;
  document.querySelectorAll('.cloud').forEach(e=>e.classList.remove('selected'));
  el.classList.add('selected');
}

function pay(){
  customerName = document.getElementById('name').value.trim();
  if(!customerName){alert('اكتب اسمك الأول يا زعيم ☁️');return}
  if(!document.querySelector('.cloud.selected')){alert('اختار سحابة الأول');return}
  
  cloudNum = Math.floor(Math.random()*9000)+1000;
  let msg = encodeURIComponent('السلام عليكم، حولت 10ج سحابة باسم '+customerName+' رقم السحابة #SC-'+cloudNum);
  
  // الرقم بتاعك 01282175854
  window.open('https://wa.me/201282175854?text='+msg, '_blank');
  
  paid = true;
  document.getElementById('payBtn').style.display = 'none';
  document.getElementById('downloadBtn').style.display = 'block';
  alert('تمام! بعد ما تبعت السكرين واتساب ارجع دوس "نزل شهادتك"');
}

function download(){
  if(!paid){
    alert('لازم تدفع الأول يا صاحبي 😂');
    return;
  }
  
  document.getElementById('nameShow').innerText = customerName;
  document.getElementById('cloudShow').innerText = selectedCloud;
  document.getElementById('num').innerText = cloudNum;
  document.getElementById('date').innerText = new Date().toLocaleDateString('ar-EG');
  document.getElementById('certificate').style.display = 'block';
  
  setTimeout(()=>{
    document.getElementById('dingSound').play().catch(()=>{});
    html2canvas(document.getElementById('certificate'), {scale:2, useCORS:true}).then(canvas=>{
      let link = document.createElement('a');
      link.download = 'سحابتي-'+customerName+'.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    });
  },800);
}
</script>
</body>
</html>
