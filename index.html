<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>جولة في السما الأولى</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Tajawal', sans-serif;background:#87CEEB;overflow:hidden}

.sky{width:100%;height:100vh;position:relative;background:linear-gradient(180deg,#87CEEB 0%,#E0F6FF 50%,#FFF 100%)}
.cloud{position:absolute;width:150px;height:80px;background:white;border-radius:50px;opacity:0.8;animation:float 20s infinite}
.cloud:before,.cloud:after{content:'';position:absolute;background:white;border-radius:50%}
.cloud:before{width:80px;height:80px;top:-30px;left:20px}
.cloud:after{width:100px;height:100px;top:-40px;right:20px}
@keyframes float{0%,100%{transform:translateX(0)}50%{transform:translateX(100px)}}

.message{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#2c3e50;opacity:0;transition:1s;pointer-events:none}
.message.show{opacity:1}
.message h2{font-size:32px;margin-bottom:15px;font-weight:300}
.message p{font-size:18px;color:#555}

.river{position:absolute;bottom:0;width:100%;height:150px;background:linear-gradient(90deg,rgba(255,255,255,0.3),rgba(173,216,230,0.8),rgba(255,255,255,0.3));animation:wave 3s ease-in-out infinite;pointer-events:none}
@keyframes wave{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.1)}}

.angel{position:absolute;width:80px;height:120px;bottom:100px;left:50%;transform:translateX(-50%);opacity:0;transition:1s;pointer-events:none}
.angel.show{opacity:1}

.gate{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);width:200px;height:300px;background:linear-gradient(135deg,#fff,#f0f8ff);border-radius:100px 100px 20px 20px;box-shadow:0 0 40px rgba(173,216,230,0.8);border:3px solid #fff;transition:1s;pointer-events:none}
.gate.open{transform:translate(-50%,-50%) scale(1)}

.certificate{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:white;padding:40px;border-radius:20px;box-shadow:0 10px 40px rgba(0,0,0,0.1);text-align:center;min-width:350px;transition:0.8s}
.certificate.show{transform:translate(-50%,-50%) scale(1)}
.certificate h2{color:#2c3e50;font-weight:300;margin-bottom:20px}
.certificate p{color:#666;margin:10px 0}
button{background:#87CEEB;border:none;padding:12px 30px;border-radius:25px;color:white;font-size:16px;cursor:pointer;margin-top:20px;transition:0.3s}
button:hover{background:#5eb3d6}

#startScreen{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:9999;background:rgba(255,255,255,0.95);padding:40px;border-radius:20px;box-shadow:0 5px 20px rgba(0,0,0,0.1)}
input{padding:12px 20px;border:2px solid #ddd;border-radius:20px;font-size:16px;text-align:center;margin:15px 0;width:250px;outline:none}
input:focus{border-color:#87CEEB}
.start-btn{background:#87CEEB;color:white;border:none;padding:12px 30px;border-radius:25px;font-size:16px;cursor:pointer}
</style>
</head>
<body>

<audio id="windSound" loop src="https://cdn.pixabay.com/audio/2022/08/21/audio_12467e1b1e.mp3"></audio>
<audio id="chime" src="https://cdn.pixabay.com/audio/2021/08/03/audio_9c3b1e9c8c.mp3"></audio>

<div class="sky" id="sky">
  <div class="cloud" style="top:10%;left:10%"></div>
  <div class="cloud" style="top:20%;right:15%;animation-delay:5s"></div>
  
  <div id="startScreen">
    <h2 style="color:#2c3e50;font-weight:300;margin-bottom:15px">اكتب اسمك وابدأ الرحلة</h2>
    <input id="playerName" placeholder="اسمك هنا" autocomplete="off">
    <br>
    <button class="start-btn" onclick="startJourney()">ابدأ</button>
  </div>

  <div class="message" id="msg1">
    <h2>مرحباً بك في السما الأولى ☁️</h2>
    <p>الهوا هنا نضيف... والقلب هادي</p>
  </div>

  <div class="river" id="river" style="opacity:0;transition:1s"></div>
  <div class="message" id="msg2">
    <h2>نهر من نور</h2>
    <p>مياهه بتغسل كل تعب الدنيا</p>
  </div>

  <div class="angel" id="angel">
    <svg viewBox="0 0 100 150">
      <circle cx="50" cy="30" r="20" fill="#FFD700"/>
      <rect x="40" y="50" width="20" height="50" fill="white" rx="10"/>
      <path d="M20 60 Q10 40 20 30" fill="white" opacity="0.7"/>
      <path d="M80 60 Q90 40 80 30" fill="white" opacity="0.7"/>
    </svg>
  </div>
  <div class="message" id="msg3">
    <h2>الملاك يبتسم لك</h2>
    <p>تفضل... مفتاح قصرك السماوي</p>
  </div>

  <div class="gate" id="gate"></div>
  <div class="message" id="msg4">
    <h2>بوابة قصرك اتفتحت ✨</h2>
    <p>مبروك يا <span id="nameInMsg"></span></p>
  </div>

  <div class="certificate" id="cert">
    <h2>شهادة ملكية السما الأولى</h2>
    <p>تشهد السماء أن</p>
    <p style="font-size:24px;color:#87CEEB;font-weight:bold" id="certName"></p>
    <p>مالك قطعة من السما الأولى</p>
    <p style="font-size:14px;color:#999">رقم: <span id="certNum"></span></p>
    <p style="font-size:14px;color:#999">التاريخ: <span id="certDate"></span></p>
    <button onclick="download()">تحميل الشهادة</button>
  </div>
</div>

<script>
let step = 0;
let name = '';
let num = Math.floor(Math.random()*9000)+1000;

function startJourney(){
  name = document.getElementById('playerName').value.trim();
  if(!name){alert('اكتب اسمك الأول');return}
  
  document.getElementById('startScreen').style.display='none';
  document.getElementById('windSound').play();
  nextStep();
}

function nextStep(){
  setTimeout(()=>{
    if(step==0){
      document.getElementById('msg1').classList.add('show');
      step++; nextStep();
    }
    else if(step==1){
      document.getElementById('msg1').classList.remove('show');
      document.getElementById('river').style.opacity='1';
      document.getElementById('msg2').classList.add('show');
      step++; nextStep();
    }
    else if(step==2){
      document.getElementById('msg2').classList.remove('show');
      document.getElementById('angel').classList.add('show');
      document.getElementById('chime').play();
      document.getElementById('msg3').classList.add('show');
      step++; nextStep();
    }
    else if(step==3){
      document.getElementById('msg3').classList.remove('show');
      document.getElementById('gate').classList.add('open');
      document.getElementById('nameInMsg').innerText = name;
      document.getElementById('msg4').classList.add('show');
      step++; nextStep();
    }
    else if(step==4){
      setTimeout(()=>{
        document.getElementById('msg4').classList.remove('show');
        document.getElementById('cert').classList.add('show');
        document.getElementById('certName').innerText = name;
        document.getElementById('certNum').innerText = num;
        document.getElementById('certDate').innerText = new Date().toLocaleDateString('ar-EG');
        document.getElementById('chime').play();
      }, 2000);
    }
  }, 3000);
}

function download(){
  html2canvas(document.getElementById('cert'),{scale:2,background:'#fff'}).then(canvas=>{
    let a = document.createElement('a');
    a.download = 'شهادة_السما_'+name+'.png';
    a.href = canvas.toDataURL();
    a.click();
  });
}
</script>
</body>
</html>
